<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TABI</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f5f2;
      --text: #111111;
      --muted: #8a8a8a;
      --line: #ece7e2;
      --primary: #111111;
      --primary-soft: #f5f5f5;
      --accent: #e8dfd6;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Sans JP", Pretendard, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
    }
    textarea { resize: vertical; min-height: 36px; }
    .hidden { display: none !important; }

    .app {
      width: min(1360px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 18px 18px;
    }

    .topbar, .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail-header {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      align-items: end;
      column-gap: 22px;
      row-gap: 12px;
      margin: 54px 0 22px;
    }

    .brand { display: flex; align-items: center; gap: 10px; letter-spacing: -0.04em; }
    .brand-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #111;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .brand h1 { margin: 0; font-size: clamp(24px, 3.5vw, 38px); line-height: 1; }
    .subcopy { margin: 5px 0 0; color: var(--muted); font-size: 13px; letter-spacing: -0.02em; }

    .icon-btn, .primary-btn, .ghost-btn, .danger-btn, .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.18s, opacity 0.18s;
    }
    .icon-btn:hover, .primary-btn:hover, .ghost-btn:hover, .danger-btn:hover, .back-btn:hover { transform: translateY(-1px); }
    .icon-btn { width: 42px; height: 42px; background: var(--primary); color: #fff; box-shadow: var(--shadow); }
    .primary-btn { min-height: 36px; padding: 0 14px; background: var(--primary); color: #fff; }
    .ghost-btn { min-height: 34px; padding: 0 12px; background: var(--surface); color: var(--primary); border: 1px solid var(--line); }
    .danger-btn { min-height: 32px; padding: 0 10px; background: #fef2f2; color: var(--danger); }
    .back-btn { width: 38px; height: 38px; background: var(--surface); border: 1px solid var(--line); border-radius: 13px; }
    .small-icon { width: 15px; height: 15px; }

    .layout-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .main-hero {
      padding: clamp(22px, 3vw, 34px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      background: var(--surface);
    }
    .main-hero h2 { margin: 0; font-size: clamp(26px, 4vw, 48px); letter-spacing: -0.06em; line-height: 1.05; }

    .trip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .trip-card {
      position: relative;
      min-height: 140px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(0,0,0,0.03);
    }
    .trip-card h3 { margin: 0; font-size: 20px; letter-spacing: -0.04em; }
    .trip-card p { color: var(--muted); margin: 8px 0 0; font-size: 12px; }
    .trip-open { align-self: flex-start; margin-top: 18px; }
    .delete-trip { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; background: #f8f4ed; color: var(--muted); }

    .trip-title-input {
      justify-self: start;
      width: min(760px, 100%);
      max-width: 760px;
      border: 0;
      background: transparent;
      padding: 0;
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 900;
      letter-spacing: -0.065em;
      box-shadow: none !important;
      text-align: left;
    }

    .tabs {
      display: flex;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 16px;
    }
    .tab-btn {
      flex: 0 0 auto;
      min-width: 120px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
    }
    .tab-btn:hover { background: #111; color: #fff; }
    .tab-btn:hover { background: var(--primary); color: #fff; }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      margin-bottom: 14px;
    }
    .section, .agenda-section, .manager-panel { padding: 18px; }

    .info-card {
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      min-height: 170px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      border-radius: 18px;
    }
    .info-card:hover { transform: translateY(-2px); box-shadow: 0 16px 38px rgba(31, 41, 55, 0.08); }
    .info-card.empty-card { display: grid; align-content: center; justify-items: start; gap: 10px; }
    .empty-card-copy { color: var(--muted); font-weight: 800; font-size: 15px; }
    .card-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .card-title { margin: 0; font-size: clamp(18px, 1.8vw, 22px); font-weight: 900; letter-spacing: -0.04em; }
    .transport-body, .stay-body { display: grid; gap: 10px; }

    .route-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      background: var(--surface-soft);
    }
    .route-points {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) 24px minmax(0, 1.05fr);
      gap: 4px;
      align-items: center;
      min-width: 0;
      font-size: 13px;
      font-weight: 800;
    }
    .route-points span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .route-points strong {
      display: block;
      width: 24px;
      text-align: center;
      line-height: 1;
      transform: translateX(-10px);
    }
    .time-range {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .transport-detail-row {
      display: grid;
      grid-template-columns: 1fr;
      padding: 0 12px;
    }
    .card-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: clamp(12px, 1.05vw, 14px); }
    .transport-detail { color: var(--text); font-weight: 600; font-size: 14px; }

    .stay-body { padding: 0; align-items: start; }
    .stay-main { font-size: clamp(16px, 1.35vw, 18px); font-weight: 800; color: var(--text); }
    .stay-address { font-size: clamp(14px, 1.2vw, 16px); font-weight: 700; color: var(--text); }
    .stay-time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
      width: 100%;
    }
    .stay-line { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 9px; align-items: center; }
    .stay-line .card-text { font-size: clamp(14px, 1.25vw, 17px); font-weight: 700; }
    .time-badge { display: inline-flex; align-items: center; justify-content: center; padding: 5px 8px; border-radius: 9px; background: var(--surface-soft); color: var(--text); font-size: 13px; font-weight: 800; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .wide { grid-column: 1 / -1; }
    .form-label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 800; }

    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .section h2, .agenda-section h2, .manager-panel h2 { margin: 0; letter-spacing: -0.04em; font-size: 20px; }

    .table-wrap { width: 100%; overflow-x: auto; border-radius: 14px; border: 1px solid var(--line); background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; }
    th, td { padding: 8px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
    th { background: var(--surface-soft); font-size: 12px; color: var(--muted); font-weight: 900; white-space: nowrap; }
    tr:last-child td { border-bottom: 0; }
    td input, td textarea, td select { min-width: 110px; border-radius: 9px; padding: 7px 8px; font-size: 13px; }
    td textarea { min-height: 34px; }
    .th-filter { display: grid; gap: 5px; }
    .th-filter select { min-width: 120px; padding: 5px 7px; font-size: 11px; border-radius: 8px; }

    .page-header h2 { margin: 0; font-size: 24px; letter-spacing: -0.05em; }
    .check-category { border: 1px solid var(--line); border-radius: 16px; background: #fff; margin-bottom: 10px; overflow: hidden; }
    .category-header { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 8px; padding: 10px; background: var(--surface-soft); }
    .category-header input { font-weight: 900; background: transparent; border: 0; box-shadow: none !important; padding: 5px; }
    .toggle-btn { width: 30px; height: 30px; border-radius: 10px; background: #fff; border: 1px solid var(--line); }
    .check-items { padding: 8px 12px 12px; }
    .check-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 8px; padding: 5px 0; }
    .check-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }
    .check-row input[type="text"] { border: 0; border-bottom: 1px solid var(--line); border-radius: 0; box-shadow: none !important; }

    .date-group { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; margin-bottom: 12px; background: #fff; }
    .date-head { display: grid; grid-template-columns: 150px auto 1fr auto; gap: 8px; align-items: center; padding: 8px 10px; background: var(--surface-soft); }
    .date-head .ghost-btn { min-height: 30px; padding: 0 10px; font-size: 12px; }
    .date-head .danger-btn { width: 30px; min-height: 30px; padding: 0; border-radius: 50%; }
    .empty { padding: 30px 16px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 18px; background: rgba(255,255,255,0.45); }

    .modal-backdrop { position: fixed; inset: 0; display: grid; place-items: center; padding: 18px; background: rgba(31,41,55,0.35); z-index: 50; }
    .modal { width: min(460px, 100%); max-height: 92vh; overflow: auto; padding: 20px; background: #fff; border-radius: 22px; box-shadow: var(--shadow); }
    .modal h2 { margin: 0 0 12px; letter-spacing: -0.04em; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

    @media (max-width: 900px) {
      .app { padding: 14px; }
      .main-hero { grid-template-columns: 1fr; }
      .detail-header { grid-template-columns: 38px 1fr; align-items: center; margin-top: 34px; }
      .detail-header > div { grid-column: 1 / -1; justify-self: start; flex-wrap: wrap; }
      .tabs { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
      .tab-btn { flex: 0 0 auto; }
      .detail-grid { grid-template-columns: 1fr; }
      .route-row { grid-template-columns: 1fr; }
      .time-range { justify-content: flex-start; }
      .stay-time-row { grid-template-columns: 1fr; }
      .stay-body { padding: 0; }
      .info-card { min-height: auto; padding: 18px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .wide { grid-column: auto; }

      .agenda-section, .manager-panel { padding: 14px; }
      .section-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
      }
      .section-head h2 { font-size: 18px; }
      .section-head .subcopy {
        font-size: 11px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .section-head .primary-btn,
      .section-head .ghost-btn {
        min-height: 30px;
        padding: 0 10px;
        font-size: 11px;
        white-space: nowrap;
      }

      .date-head {
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 6px;
        padding: 8px;
      }
      .date-head input[type="date"] {
        min-width: 0;
        width: 100%;
        font-size: 12px;
        padding: 7px 8px;
      }
      .date-head .ghost-btn {
        min-height: 30px;
        padding: 0 9px;
        font-size: 11px;
        white-space: nowrap;
      }
      .date-head .danger-btn {
        width: 28px;
        min-height: 28px;
        padding: 0;
      }
      .date-head > span { display: none; }

      .table-wrap {
        overflow-x: visible;
        border: 0;
        background: transparent;
      }
      table, thead, tbody, tr, th, td {
        display: block;
        width: 100%;
        min-width: 0;
      }
      thead { display: none; }
      tbody { display: grid; gap: 8px; }
      tr[data-id], tr[data-group] {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        padding: 10px;
      }
      td {
        border-bottom: 0;
        padding: 4px 0;
      }
      td input, td textarea, td select {
        min-width: 0;
        width: 100%;
        font-size: 12px;
        padding: 8px;
      }
      td .danger-btn, td button.danger-btn {
        width: 100%;
        min-height: 30px;
        font-size: 11px;
        margin-top: 4px;
      }

      .category-header {
        grid-template-columns: auto 1fr auto auto;
        gap: 6px;
        padding: 8px;
      }
      .category-header .ghost-btn,
      .category-header .danger-btn {
        min-height: 28px;
        padding: 0 8px;
        font-size: 11px;
      }
      .check-row {
        grid-template-columns: auto 1fr auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main id="mainPage">
      <div class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 12c2-2 4-1 4 1s-2 4-5 4-5-2-5-5 3-7 8-7 9 4 9 9-4 9-10 9-11-5-11-11"/>
            </svg>
          </div>
          <div>
            <h1>TABI</h1>
            <p class="subcopy">旅ノート · my trip note</p>
            <p class="subcopy">여행 계획, 장소, 지출, 일정을 가볍게 관리하세요.</p>
          </div>
        </div>
        <button class="icon-btn" id="addTripBtn" aria-label="새로운 여행 추가"><i data-lucide="plus"></i></button>
      </div>

      <section class="main-hero layout-card">
        <div>
          <h2>Plan lightly.<br />Travel deeply.</h2>
          <p class="subcopy">새로운 여행을 추가하고 세부 계획을 작성하세요.</p>
        </div>
      </section>

      <section id="tripGrid" class="trip-grid"></section>
    </main>

    <main id="detailPage" class="hidden">
      <header class="detail-header">
        <button class="back-btn" id="backBtn" aria-label="메인으로 돌아가기"><i data-lucide="arrow-left"></i></button>
        <input id="tripTitleInput" class="trip-title-input" aria-label="여행 제목" />
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="ghost-btn" id="shareBtn"><i data-lucide="share-2" class="small-icon"></i> 공유</button>
          <button class="ghost-btn" id="authBtn"><i data-lucide="user" class="small-icon"></i> 로그인</button>
          <button class="ghost-btn" id="saveStatus"><i data-lucide="cloud-check" class="small-icon"></i> 자동 저장</button>
        </div>
      </header>

      <nav class="tabs" aria-label="세부 탭">
        <button class="tab-btn" data-manager="checklist">✅&nbsp;체크리스트</button>
        <button class="tab-btn" data-manager="places">📍&nbsp;가고 싶은 곳</button>
        <button class="tab-btn" data-manager="expenses">💵&nbsp;지출</button>
      </nav>

      <section class="detail-grid">
        <article id="transportCard" class="section layout-card info-card" role="button" tabindex="0" aria-label="교통수단 정보 입력"></article>
        <article id="stayCard" class="section layout-card info-card" role="button" tabindex="0" aria-label="숙박 정보 입력"></article>
      </section>

      <section class="agenda-section layout-card">
        <div class="section-head">
          <div>
            <h2>일정</h2>
            <p class="subcopy">날짜를 추가한 뒤 시간, 장소, 교통수단과 비고를 작성하세요.</p>
          </div>
          <button class="primary-btn" id="addScheduleDateBtn"><i data-lucide="calendar-plus" class="small-icon"></i> 날짜 추가</button>
        </div>
        <div id="scheduleWrap"></div>
      </section>
    </main>

    <main id="managerPage" class="hidden">
      <header class="page-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="back-btn" id="managerBackBtn"><i data-lucide="arrow-left"></i></button>
          <h2 id="managerTitle"></h2>
        </div>
        <button class="ghost-btn" id="managerSaveStatus"><i data-lucide="cloud-check" class="small-icon"></i> 자동 저장</button>
      </header>
      <section id="managerPanel" class="manager-panel layout-card"></section>
    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h2>새로운 여행 추가</h2>
      <input id="newTripTitle" placeholder="예: 오사카 3박 4일" />
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelTripBtn">취소</button>
        <button class="primary-btn" id="createTripBtn">추가</button>
      </div>
    </div>
  </div>

  <div id="infoModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="infoModalTitle"></h2>
      <div id="infoModalFields" class="form-grid"></div>
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelInfoBtn">취소</button>
        <button class="primary-btn" id="confirmInfoBtn">확인</button>
      </div>
    </div>
  </div>

  <div id="authModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h2>로그인</h2>
      <p class="subcopy">단일 HTML 버전에서는 같은 브라우저의 로컬 저장소 기준으로 동기화됩니다.</p>
      <input id="authNameInput" placeholder="이름 또는 닉네임" />
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelAuthBtn">취소</button>
        <button class="primary-btn" id="confirmAuthBtn">확인</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'travelog-app-v2';
    const CLOUD_KEY = 'travelog-cloud';
    const USER_KEY = 'travelog-user';
    const CURRENCIES = ['KRW', 'JPY', 'USD', 'EUR', 'CNY', 'GBP', 'THB', 'VND'];

    const $ = selector => document.querySelector(selector);
    const $$ = selector => [...document.querySelectorAll(selector)];

    let state = loadState();
    let currentTripId = null;
    let managerView = null;
    let editingInfoType = null;
    let currentUser = localStorage.getItem(USER_KEY) || '';
    let filters = {
      placesType: 'all',
      placesArea: 'all',
      expenseType: 'all',
      paymentType: 'all',
      scheduleTransport: 'all'
    };

    function safeUUID() {
      return crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
    }

    function defaultTrip(title) {
      return {
        id: safeUUID(),
        title,
        createdAt: new Date().toISOString(),
        checklist: [],
        places: [],
        expenses: [],
        transport: {
          type: '', name: '', from: '', to: '', start: '', end: '',
          returnFrom: '', returnTo: '', returnName: '', returnStart: '', returnEnd: ''
        },
        stay: { type: '', name: '', checkin: '', checkout: '', location: '' },
        schedule: []
      };
    }

    function loadState() {
      try {
        const cloud = localStorage.getItem(CLOUD_KEY);
        const local = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('travelog-app-v1');
        const saved = JSON.parse(cloud || local || 'null');
        if (saved && Array.isArray(saved.trips)) {
          saved.trips.forEach(migrateTrip);
          return saved;
        }
      } catch (error) {
        console.warn('저장 데이터를 불러오지 못했습니다.', error);
      }
      return { trips: [defaultTrip('제주 여름 여행')] };
    }

    function migrateTrip(trip) {
      trip.transport = {
        type: '', name: '', from: '', to: '', start: '', end: '',
        returnFrom: '', returnTo: '', returnName: '', returnStart: '', returnEnd: '',
        ...(trip.transport || {})
      };
      trip.stay = { type: '', name: '', checkin: '', checkout: '', location: '', ...(trip.stay || {}) };
      trip.checklist ||= [];
      trip.places ||= [];
      trip.expenses ||= [];
      trip.schedule ||= [];

      if (trip.schedule.length && !trip.schedule[0].items) {
        const grouped = [];
        trip.schedule.forEach(row => {
          const date = row.date || '';
          let group = grouped.find(item => item.date === date);
          if (!group) {
            group = { id: safeUUID(), date, items: [] };
            grouped.push(group);
          }
          group.items.push({
            id: row.id || safeUUID(),
            time: row.time || '',
            place: row.place || '',
            transport: row.transport || '',
            note: row.note || ''
          });
        });
        trip.schedule = grouped;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (currentUser) localStorage.setItem(CLOUD_KEY, JSON.stringify(state));
      ['#saveStatus', '#managerSaveStatus'].forEach(selector => {
        const el = $(selector);
        if (el) el.innerHTML = '<i data-lucide="cloud-check" class="small-icon"></i> 자동 저장';
      });
      refreshIcons();
    }

    function currentTrip() {
      return state.trips.find(trip => trip.id === currentTripId);
    }

    function refreshIcons() {
      if (window.lucide) lucide.createIcons();
    }

    function escapeHTML(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    function escapeAttr(value = '') { return escapeHTML(value); }
    function valueOrDash(value) { return value ? escapeHTML(value) : '—'; }
    function uniqueValues(items, key) {
      return [...new Set(items.map(item => item[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
    }
    function formatDate(iso) {
      return new Intl.DateTimeFormat('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' }).format(new Date(iso));
    }

    function openModal() {
      $('#modalBackdrop').classList.remove('hidden');
      $('#newTripTitle').value = '';
      setTimeout(() => $('#newTripTitle').focus(), 0);
    }

    function closeModal() {
      $('#modalBackdrop').classList.add('hidden');
    }

    function createTrip() {
      const title = $('#newTripTitle').value.trim();
      if (!title) return;
      const trip = defaultTrip(title);
      state.trips.unshift(trip);
      saveState();
      closeModal();
      renderMain();
      openDetail(trip.id);
    }

    function deleteTrip(id, event) {
      event.stopPropagation();
      if (!confirm('이 여행을 삭제할까요?')) return;
      state.trips = state.trips.filter(trip => trip.id !== id);
      saveState();
      renderMain();
    }

    function showPage(page) {
      $('#mainPage').classList.toggle('hidden', page !== 'main');
      $('#detailPage').classList.toggle('hidden', page !== 'detail');
      $('#managerPage').classList.toggle('hidden', page !== 'manager');
    }

    function renderMain() {
      showPage('main');
      const grid = $('#tripGrid');
      grid.innerHTML = '';
      if (!state.trips.length) {
        grid.innerHTML = '<div class="empty">아직 추가된 여행이 없습니다.</div>';
        refreshIcons();
        return;
      }
      state.trips.forEach(trip => {
        const card = document.createElement('article');
        card.className = 'trip-card';
        const scheduleCount = trip.schedule.reduce((sum, group) => sum + (group.items?.length || 0), 0);
        card.innerHTML = `
          <button class="delete-trip" title="삭제"><i data-lucide="x" class="small-icon"></i></button>
          <div><h3>${escapeHTML(trip.title)}</h3><p>${formatDate(trip.createdAt)} 생성 · 일정 ${scheduleCount}개 · 장소 ${trip.places.length}개</p></div>
          <button class="ghost-btn trip-open">열기 <i data-lucide="arrow-right" class="small-icon"></i></button>`;
        card.addEventListener('click', () => openDetail(trip.id));
        card.querySelector('.delete-trip').addEventListener('click', event => deleteTrip(trip.id, event));
        grid.appendChild(card);
      });
      refreshIcons();
    }

    function openDetail(id) {
      currentTripId = id;
      showPage('detail');
      renderDetail();
    }

    function renderDetail() {
      const trip = currentTrip();
      if (!trip) return renderMain();
      $('#tripTitleInput').value = trip.title;
      $('#authBtn').innerHTML = currentUser
        ? `<i data-lucide="log-out" class="small-icon"></i> ${escapeHTML(currentUser)}`
        : '<i data-lucide="user" class="small-icon"></i> 로그인';
      renderTransportStayCards(trip);
      renderSchedule();
      refreshIcons();
    }

    function hasTransportData(transport) {
      return ['type', 'name', 'from', 'to', 'start', 'end', 'returnFrom', 'returnTo', 'returnName', 'returnStart', 'returnEnd']
        .some(key => transport[key]);
    }

    function hasStayData(stay) {
      return ['type', 'name', 'location', 'checkin', 'checkout'].some(key => stay[key]);
    }

        <div class="transport-body">
          <div class="route-row">
            <div class="route-points"><span>${valueOrDash(t.from)}</span><strong>→</strong><span>${valueOrDash(t.to)}</span></div>
            <div class="time-range"><span>${valueOrDash(t.start)}</span><span>→</span><span>${valueOrDash(t.end)}</span></div>
          </div>

      `;

      $('#stayCard').innerHTML = hasStayData(s) ? `

        <label class="form-label wide">숙박시설 이름<input id="infoStayName" value="${escapeAttr(data.name)}" /></label>

      $('#infoModalBackdrop').classList.remove('hidden');
      refreshIcons();
    }

    function closeInfoModal() {
      $('#infoModalBackdrop').classList.add('hidden');
      editingInfoType = null;
    }

    function confirmInfoModal() {
      const trip = currentTrip();
      if (!trip || !editingInfoType) return;

      if (editingInfoType === 'transport') {
        trip.transport = {
          ...trip.transport,
          type: $('#infoType').value.trim(),
          from: $('#infoFrom').value.trim(),
          to: $('#infoTo').value.trim(),
          name: $('#infoName').value.trim(),
          start: $('#infoStart').value,
          end: $('#infoEnd').value,
          returnFrom: $('#infoReturnFrom').value.trim(),
          returnTo: $('#infoReturnTo').value.trim(),
          returnName: $('#infoReturnName').value.trim(),
          returnStart: $('#infoReturnStart').value,
          returnEnd: $('#infoReturnEnd').value
        };
      } else {
        trip.stay = {
          ...trip.stay,
          type: $('#infoType').value.trim(),
          name: $('#infoStayName').value.trim(),
          location: $('#infoStayLocation').value.trim(),
          checkin: $('#infoStayCheckin').value,
          checkout: $('#infoStayCheckout').value
        };
      }

      saveState();
      closeInfoModal();
      renderDetail();
    }

    function toggleAuth() {
      if (currentUser) {
        currentUser = '';
        localStorage.removeItem(USER_KEY);
        renderDetail();
        return;
      }
      $('#authNameInput').value = '';
      $('#authModalBackdrop').classList.remove('hidden');
      setTimeout(() => $('#authNameInput').focus(), 0);
    }

    function closeAuthModal() {
      $('#authModalBackdrop').classList.add('hidden');
    }

    function confirmAuth() {
      currentUser = $('#authNameInput').value.trim();
      if (!currentUser) return;
      localStorage.setItem(USER_KEY, currentUser);
      localStorage.setItem(CLOUD_KEY, JSON.stringify(state));
      closeAuthModal();
      renderDetail();
    }

    async function shareTrip() {
      const trip = currentTrip();
      if (!trip) return;
      const text = JSON.stringify(trip, null, 2);
      try {
        await navigator.clipboard.writeText(text);
        alert('현재 여행 데이터가 클립보드에 복사됐어요. 단일 HTML 버전은 실시간 공동 편집은 지원하지 않아요.');
      } catch (error) {
        alert('공유 데이터 복사에 실패했어요.');
      }
    }

      managerView = view;
      showPage('manager');
      renderManager();

        };
        box.querySelector('.category-header input').oninput = e => {
          category.title = e.target.value;
          saveState();
        };
        box.querySelector('.add-item-btn').onclick = () => {
          category.items.push({ id: safeUUID(), text: '', done: false });
          saveState();
          renderChecklistPanel();
        };
        box.querySelector('.delete-category-btn').onclick = () => {
          trip.checklist = trip.checklist.filter(item => item.id !== category.id);
          saveState();
          renderChecklistPanel();

        items.innerHTML = category.items.length ? '' : '<p class="subcopy">세부 항목을 추가하세요.</p>';

            item.text = e.target.value;
            saveState();

            category.items = category.items.filter(checkItem => checkItem.id !== item.id);

            renderChecklistPanel();
          };
          items.appendChild(row);
        });
        wrap.appendChild(box);
      });
      refreshIcons();

      refreshIcons();
    }

    function renderSchedule() {
      const trip = currentTrip();
      const allItems = trip.schedule.flatMap(group => group.items || []);
      const wrap = $('#scheduleWrap');
      wrap.innerHTML = '';

      if (!trip.schedule.length) {
        wrap.innerHTML = '<div class="empty">아직 일정 날짜가 없습니다. 날짜를 먼저 추가하세요.</div>';
        refreshIcons();
        return;
      }

      trip.schedule.forEach(group => {
        const box = document.createElement('div');
        box.className = 'date-group';
        box.innerHTML = `
          <div class="date-head">
            <input type="date" value="${escapeAttr(group.date)}" class="schedule-date" />
            <button class="ghost-btn add-schedule-item"><i data-lucide="plus" class="small-icon"></i> 일정</button>
            <span></span>
            <button class="danger-btn delete-schedule-date"><i data-lucide="trash-2" class="small-icon"></i></button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>시간</th><th>장소</th><th><div class="th-filter"><span>교통수단</span><select class="scheduleTransportFilter"></select></div></th><th>비고</th><th></th></tr></thead>
              <tbody></tbody>
            </table>
          </div>`;

        box.querySelector('.schedule-date').oninput = e => { group.date = e.target.value; saveState(); };
        box.querySelector('.add-schedule-item').onclick = () => {
          group.items.push({ id: safeUUID(), time: '', place: '', transport: '', note: '' });
          saveState();
          renderSchedule();
        };
        box.querySelector('.delete-schedule-date').onclick = () => {
          trip.schedule = trip.schedule.filter(item => item.id !== group.id);
          saveState();
          renderSchedule();
        };

        wrap.appendChild(box);
        fillSelect(box.querySelector('.scheduleTransportFilter'), uniqueValues(allItems, 'transport'), filters.scheduleTransport, '전체');
        box.querySelector('.scheduleTransportFilter').onchange = e => { filters.scheduleTransport = e.target.value; renderSchedule(); };

        const rows = group.items.filter(item => filters.scheduleTransport === 'all' || item.transport === filters.scheduleTransport);
        box.querySelector('tbody').innerHTML = rows.map(item => `
          <tr data-group="${group.id}" data-id="${item.id}" draggable="true">
            <td><input data-key="time" type="time" value="${escapeAttr(item.time)}" /></td>
            <td><input data-key="place" value="${escapeAttr(item.place)}" placeholder="장소" /></td>
            <td><input data-key="transport" value="${escapeAttr(item.transport)}" placeholder="교통수단" /></td>
            <td><textarea data-key="note" placeholder="비고">${escapeHTML(item.note)}</textarea></td>
            <td><button class="danger-btn delete-schedule-item"><i data-lucide="trash-2" class="small-icon"></i></button></td>
          </tr>`).join('') || '<tr><td colspan="5"><div class="empty">이 날짜에 추가된 일정이 없습니다.</div></td></tr>';
      });

      bindScheduleInputs();
      bindScheduleDrag();
      refreshIcons();
    }

    function bindTableInputs(collectionName, rerender) {
      const trip = currentTrip();
      $$(`tr[data-id]`).forEach(row => {
        const id = row.dataset.id;
        if (row.dataset.group) return;
        const item = trip[collectionName].find(entry => entry.id === id);
        if (!item) return;
        row.querySelectorAll('[data-key]').forEach(input => {
          input.oninput = e => {
            item[input.dataset.key] = e.target.value;
            saveState();
          };
        });
        const deleteBtn = row.querySelector('.delete-row');
        if (deleteBtn) {
          deleteBtn.onclick = () => {
            trip[collectionName] = trip[collectionName].filter(entry => entry.id !== id);
            saveState();
            rerender();
          };
        }
      });
    }

    function bindScheduleDrag() {
      let dragged = null;
      $$('tr[draggable="true"]').forEach(row => {
        row.addEventListener('dragstart', () => {
          dragged = row;
          row.style.opacity = '0.45';
        });
        row.addEventListener('dragend', () => {
          row.style.opacity = '';
          dragged = null;
        });
        row.addEventListener('dragover', e => e.preventDefault());
        row.addEventListener('drop', e => {
          e.preventDefault();
          if (!dragged || dragged === row || dragged.dataset.group !== row.dataset.group) return;
          const trip = currentTrip();
          const group = trip.schedule.find(item => item.id === row.dataset.group);
          if (!group) return;
          const from = group.items.findIndex(item => item.id === dragged.dataset.id);
          const to = group.items.findIndex(item => item.id === row.dataset.id);
          if (from < 0 || to < 0) return;
          const [moved] = group.items.splice(from, 1);
          group.items.splice(to, 0, moved);
          saveState();
          renderSchedule();
        });
      });
    }

    function bindScheduleInputs() {
      const trip = currentTrip();
      $$('tr[data-group][data-id]').forEach(row => {
        if (!row.querySelector('.delete-schedule-item')) return;
        const group = trip.schedule.find(item => item.id === row.dataset.group);
        if (!group) return;
        const item = group.items.find(entry => entry.id === row.dataset.id);
        if (!item) return;
        row.querySelectorAll('[data-key]').forEach(input => {
          input.oninput = e => {
            item[input.dataset.key] = e.target.value;
            saveState();
          };
        });
        row.querySelector('.delete-schedule-item').onclick = () => {
          group.items = group.items.filter(entry => entry.id !== item.id);
          saveState();
          renderSchedule();
        };
      });
    }

    function bindExpenseInputs() {
      const trip = currentTrip();
      $$('tr[data-group][data-id]').forEach(row => {
        if (!row.querySelector('.delete-expense-item')) return;
        const group = trip.expenses.find(item => item.id === row.dataset.group);
        if (!group) return;
        const item = group.items.find(entry => entry.id === row.dataset.id);
        if (!item) return;
        row.querySelectorAll('[data-key]').forEach(input => {
          input.oninput = e => {
            let value = e.target.value;
            if (input.dataset.key === 'amount') {
              value = value.replace(/[^0-9]/g, '');
              e.target.value = value;
            }
            item[input.dataset.key] = value;
            saveState();
          };
        });
        row.querySelector('.delete-expense-item').onclick = () => {
          group.items = group.items.filter(entry => entry.id !== item.id);
          saveState();
          renderExpensesPanel();
        };
      });
    }

    function fillFilter(selector, values, selected, label) {
      fillSelect($(selector), values, selected, label);
    }

    function fillSelect(el, values, selected, label) {
      if (!el) return;
      el.innerHTML = `<option value="all">${label}</option>` + values.map(value => `<option value="${escapeAttr(value)}">${escapeHTML(value)}</option>`).join('');
      el.value = values.includes(selected) ? selected : 'all';
    }

    function runSmokeTests() {
      console.assert(typeof createTrip === 'function', 'createTrip should exist');
      console.assert(typeof renderSchedule === 'function', 'renderSchedule should exist');
      console.assert(Array.isArray(state.trips), 'state.trips should be an array');
      console.assert(document.querySelectorAll('#createTripBtn').length === 1, 'createTrip button should be unique');
      console.assert(document.querySelectorAll('#addScheduleDateBtn').length === 1, 'schedule date button should be unique');
      console.assert(getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() === '#ffffff', 'background should be white');
      console.assert(getComputedStyle(document.querySelector('.route-points') || document.documentElement).gridTemplateColumns !== '', 'route arrow grid should be valid');
    }

    $('#addTripBtn').onclick = openModal;
    $('#cancelTripBtn').onclick = closeModal;
    $('#createTripBtn').onclick = createTrip;
    $('#newTripTitle').addEventListener('keydown', e => {
      if (e.key === 'Enter') createTrip();
      if (e.key === 'Escape') closeModal();
    });
    $('#modalBackdrop').addEventListener('click', e => {
      if (e.target.id === 'modalBackdrop') closeModal();
    });
    $('#infoModalBackdrop').addEventListener('click', e => {
      if (e.target.id === 'infoModalBackdrop') closeInfoModal();
    });
    $('#authModalBackdrop').addEventListener('click', e => {
      if (e.target.id === 'authModalBackdrop') closeAuthModal();
    });
    $('#cancelInfoBtn').onclick = closeInfoModal;
    $('#confirmInfoBtn').onclick = confirmInfoModal;
    $('#cancelAuthBtn').onclick = closeAuthModal;
    $('#confirmAuthBtn').onclick = confirmAuth;
    $('#authBtn').onclick = toggleAuth;
    $('#shareBtn').onclick = shareTrip;
    $('#backBtn').onclick = renderMain;
    $('#managerBackBtn').onclick = () => { showPage('detail'); renderDetail(); };
    $('#transportCard').onclick = () => openInfoModal('transport');
    $('#stayCard').onclick = () => openInfoModal('stay');
    $('#transportCard').addEventListener('keydown', e => { if (e.key === 'Enter') openInfoModal('transport'); });
    $('#stayCard').addEventListener('keydown', e => { if (e.key === 'Enter') openInfoModal('stay'); });
    $('#tripTitleInput').oninput = e => {
      const trip = currentTrip();
      if (!trip) return;
      trip.title = e.target.value || '제목 없는 여행';
      saveState();
    };
    $$('.tab-btn').forEach(btn => { btn.onclick = () => openManager(btn.dataset.manager); });
    $('#addScheduleDateBtn').onclick = () => {
      const trip = currentTrip();
      if (!trip) return;
      trip.schedule.push({ id: safeUUID(), date: new Date().toISOString().slice(0, 10), items: [] });
      saveState();
      renderSchedule();
    };

    renderMain();
    runSmokeTests();
  </script>
</body>
</html>
